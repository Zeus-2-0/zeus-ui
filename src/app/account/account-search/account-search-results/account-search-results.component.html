<div class="container">
  <mat-table [dataSource]="datasource" matSort>
    <ng-container matColumnDef="accountId">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Account Id</mat-header-cell>
      <mat-cell *matCellDef="let element"><a style="cursor: pointer" (click)="selectAccount(element)">{{element.accountId}}</a></mat-cell>
    </ng-container>

    <ng-container matColumnDef="lineOfBusiness">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Line of Business</mat-header-cell>
      <mat-cell *matCellDef="let element">{{element.lineOfBusiness}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="marketplace">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Marketplace</mat-header-cell>
      <mat-cell *matCellDef="let element">{{element.marketplaceType}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="state">
      <mat-header-cell *matHeaderCellDef mat-sort-header>State</mat-header-cell>
      <mat-cell *matCellDef="let element">{{element.state}}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="issuerSubscriberId">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Issuer SubscriberId</mat-header-cell>
      <mat-cell *matCellDef="let element">{{element.issuerSubscriberId}}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>
</div>
